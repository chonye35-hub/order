<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>주문 대시보드</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>주문 대시보드</h1>

<div class="controls">

<input type="file" id="audioFile" accept="audio/*">

<button onclick="transcribeAudio()">음성 인식</button>

<button onclick="showManual()">직접 입력</button>

</div>

<div id="manualBox" style="display:none">

<h3>텍스트 입력</h3>

<textarea id="manualText" rows="6" cols="60"
placeholder="예: 김철수 후라이드 두마리 콜라 하나 6시에 배달"></textarea>

<br><br>

<button onclick="sendManual()">LLM 주문 분석</button>

</div>

<h3>결과</h3>

<pre id="result"></pre>

<hr>

<h2>주문 조회</h2>

<input type="date" id="datePicker" onchange="loadOrders()">

<h3 id="orderTitle"></h3>

<div id="orders"></div>

<script src="script.js"></script>

</body>
</html>
